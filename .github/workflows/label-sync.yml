name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    strategy:
      matrix:
        repo:
          - agentic-ai-tooling
          - techne-ai-agent-tools
          # Add repos here as they're created
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels to ${{ matrix.repo }}
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          repository: "Techne-Analytics/${{ matrix.repo }}"
          delete-other-labels: false
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
