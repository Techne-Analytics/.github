name: Auto-Label PR

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR from conventional commit title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const typeMap = {
              'feat':     'type: feature',
              'fix':      'type: bug',
              'docs':     'type: docs',
              'chore':    'type: chore',
              'refactor': 'type: refactor',
              'test':     'type: test',
              'ci':       'type: ci',
            };

            const match = title.match(/^(\w+)(\(.+\))?!?:/);
            if (!match) {
              core.info('PR title does not match conventional commit format');
              return;
            }

            const labels = [];
            const type = match[1];
            if (typeMap[type]) {
              labels.push(typeMap[type]);
            }

            // Tag breaking changes
            if (title.includes('!:')) {
              labels.push('breaking');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels,
              });
              core.info(`Added labels: ${labels.join(', ')}`);
            }
